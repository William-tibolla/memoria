<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nossas Memórias ❤️</title>
<style>
  :root{
    --vinho-escuro:#2b0f1e;
    --vinho:#4a1530;
    --rosa:#e85d8a;
    --rosa-claro:#ffb3c9;
    --dourado:#f3c98b;
    --creme:#fff4ec;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:linear-gradient(160deg,var(--vinho-escuro) 0%,var(--vinho) 55%,#6b1f3f 100%);
    color:var(--creme);
    display:flex;flex-direction:column;align-items:center;
    padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));
    position:relative;
    touch-action:manipulation;
  }

  /* ---------- corações flutuando no fundo ---------- */
  .coracao-bg{
    position:fixed;bottom:-40px;
    color:rgba(232,93,138,.18);
    animation:flutuar linear infinite;
    pointer-events:none;user-select:none;
    z-index:0;
  }
  @keyframes flutuar{
    0%{transform:translateY(0) rotate(0deg);opacity:0}
    10%{opacity:1}
    100%{transform:translateY(-110vh) rotate(25deg);opacity:0}
  }
  @media (prefers-reduced-motion:reduce){
    .coracao-bg{display:none}
    *{animation-duration:.01s!important;transition-duration:.01s!important}
  }

  /* ---------- cabeçalho ---------- */
  header{text-align:center;z-index:1;margin-bottom:6px;width:100%}
  h1{
    font-size:clamp(1.25rem,5.5vw,1.7rem);
    font-weight:normal;font-style:italic;
    color:var(--rosa-claro);
    letter-spacing:.04em;
  }
  h1 span{color:var(--dourado)}

  .barra{
    display:flex;gap:8px;justify-content:center;align-items:stretch;
    margin-top:10px;z-index:1;
  }
  .barra .info{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(243,201,139,.35);
    border-radius:14px;
    padding:6px 14px;
    font-size:.85rem;
    min-width:92px;
    backdrop-filter:blur(4px);
  }
  .barra small{
    display:block;font-size:.62rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--rosa-claro);opacity:.8;
    font-family:-apple-system,sans-serif;
  }
  .barra strong{font-size:1.05rem;color:var(--creme)}
  .barra strong.alerta{color:#ff8da6}

  #btnMusica{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(243,201,139,.35);
    border-radius:14px;
    color:var(--dourado);
    font-size:1.15rem;
    width:46px;
    cursor:pointer;
    backdrop-filter:blur(4px);
    transition:transform .15s ease;
  }
  #btnMusica:active{transform:scale(.92)}
  #btnMusica.mudo{opacity:.45}

  /* ---------- tabuleiro ---------- */
  #tabuleiro{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    width:min(94vw,440px);
    z-index:1;
    margin-top:10px;
    flex:1;
    align-content:center;
  }
  .carta{
    aspect-ratio:3/4;
    perspective:800px;
    cursor:pointer;
  }
  .carta-inner{
    position:relative;width:100%;height:100%;
    transform-style:preserve-3d;
    transition:transform .45s cubic-bezier(.4,.2,.2,1);
  }
  .carta.aberta .carta-inner{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    border-radius:12px;
    overflow:hidden;
  }
  .verso{
    background:linear-gradient(145deg,#7d2b4e,#52183a);
    border:1.5px solid rgba(243,201,139,.45);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(0,0,0,.35);
  }
  .verso::before{
    content:"❦";
    font-size:1.6rem;
    color:var(--dourado);
    opacity:.85;
  }
  .frente{
    transform:rotateY(180deg);
    background:linear-gradient(145deg,#e85d8a,#b03868);
    border:1.5px solid var(--dourado);
  }
  .frente img{
    width:100%;height:100%;object-fit:cover;
    position:absolute;inset:0;
    -webkit-user-drag:none;user-select:none;
  }
  .carta.combinada .carta-inner{
    animation:brilho .6s ease;
  }
  .carta.combinada .frente{
    border-color:var(--rosa-claro);
    box-shadow:0 0 14px rgba(255,179,201,.7);
  }
  @keyframes brilho{
    0%,100%{transform:rotateY(180deg) scale(1)}
    50%{transform:rotateY(180deg) scale(1.08)}
  }
  .carta.travada{pointer-events:none}

  /* ---------- player do Spotify ---------- */
  .spotify{
    width:min(94vw,440px);
    z-index:1;
    margin-top:10px;
    border-radius:14px;
    overflow:hidden;
    flex-shrink:0;
  }
  .spotify iframe{display:block;border:none}

  /* ---------- overlays (vitória / derrota) ---------- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(25,7,17,.88);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    z-index:10;
    opacity:0;pointer-events:none;
    transition:opacity .4s ease;
  }
  .overlay.visivel{opacity:1;pointer-events:auto}
  .caixa{
    background:linear-gradient(160deg,#5a1c3c,#3a1128);
    border:1.5px solid var(--dourado);
    border-radius:22px;
    padding:34px 26px;
    width:min(86vw,360px);
    text-align:center;
    box-shadow:0 14px 50px rgba(0,0,0,.55);
    transform:scale(.9);
    transition:transform .4s cubic-bezier(.3,1.4,.5,1);
  }
  .overlay.visivel .caixa{transform:scale(1)}
  .caixa .emoji{font-size:3rem;display:block;margin-bottom:12px}
  .caixa h2{
    font-style:italic;font-weight:normal;
    font-size:1.35rem;line-height:1.4;
    color:var(--rosa-claro);
    margin-bottom:10px;
  }
  .caixa p{font-size:.9rem;opacity:.85;margin-bottom:22px}
  .caixa button{
    font-family:Georgia,serif;font-style:italic;
    font-size:1.05rem;
    background:linear-gradient(135deg,var(--rosa),#c2406f);
    color:#fff;border:none;
    border-radius:30px;
    padding:13px 34px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(232,93,138,.45);
    transition:transform .15s ease;
  }
  .caixa button:active{transform:scale(.95)}
</style>
</head>
<body>

<header>
  <h1>Nossas <span>Memórias</span></h1>
  <div class="barra">
    <div class="info"><small>Movimentos</small><strong id="movs">0 / 20</strong></div>
    <div class="info"><small>Tempo</small><strong id="tempo">00:00</strong></div>
    <button id="btnMusica" class="mudo" title="Música">♪</button>
  </div>
</header>

<div id="tabuleiro"></div>

     ============================================================ -->
<audio id="musica" src="musica.mp3" loop preload="auto"></audio>

<!-- overlay de vitória -->
<div class="overlay" id="telaVitoria">
  <div class="caixa">
    <span class="emoji">💖</span>
    <h2>Você encontrou todas as nossas memórias ❤️</h2>
    <p id="statsVitoria"></p>

</div>

<!-- overlay de derrota -->
<div class="overlay" id="telaDerrota">

</div>

/* Limite de movimentos (mude se quiser mais fácil/difícil) */
const LIMITE_MOVIMENTOS = 20;

/* ------------------- estado do jogo ------------------- */
let cartasViradas = [];
let paresEncontrados = 0;
let movimentos = 0;
let bloqueado = false;
let cronometro = null;
let segundos = 0;
let comecou = false;
let musicaLigada = true;

const tabuleiro  = document.getElementById("tabuleiro");
const elMovs     = document.getElementById("movs");
const elTempo    = document.getElementById("tempo");
const musica     = document.getElementById("musica");
const btnMusica  = document.getElementById("btnMusica");

/* ------------------- música ------------------- */
btnMusica.addEventListener("click", () => {
  musicaLigada = !musicaLigada;
  if(musicaLigada && comecou){
    musica.play().catch(()=>{});
  } else {
    musica.pause();
  }
  btnMusica.classList.toggle("mudo", !musicaLigada);
});

function tocarMusica(){
  if(musicaLigada){
    musica.play().then(() => {
      btnMusica.classList.remove("mudo");
    }).catch(() => {
      /* arquivo musica.mp3 não encontrado ou bloqueado — segue sem som */
      btnMusica.classList.add("mudo");
    });
  }
}

/* ------------------- montar tabuleiro ------------------- */
function montar(){
  const baralho = [];
  for(let i = 0; i < 8; i++){ baralho.push(i, i); }
  for(let i = baralho.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [baralho[i], baralho[j]] = [baralho[j], baralho[i]];
  }

  tabuleiro.innerHTML = "";
  baralho.forEach(idx => {
    const carta = document.createElement("div");
    carta.className = "carta";
    carta.dataset.par = idx;
    carta.innerHTML = `
      <div class="carta-inner">
        <div class="face verso"></div>
        <div class="face frente">
          <img src="${FOTOS[idx]}" alt="">
        </div>
      </div>`;
    carta.addEventListener("click", () => virar(carta));
    tabuleiro.appendChild(carta);
  });
}

/* ------------------- lógica de virar ------------------- */
function virar(carta){
  if(bloqueado || carta.classList.contains("aberta")) return;

  if(!comecou){
    comecou = true;
    iniciarCronometro();
    tocarMusica();
  }

  carta.classList.add("aberta");
  cartasViradas.push(carta);

  if(cartasViradas.length === 2){
    movimentos++;
    atualizarMovs();
    const [a, b] = cartasViradas;

    if(a.dataset.par === b.dataset.par){
      a.classList.add("combinada","travada");
      b.classList.add("combinada","travada");
      cartasViradas = [];
      paresEncontrados++;
      if(paresEncontrados === 8){ vitoria(); return; }
      verificarLimite();
    } else {
      bloqueado = true;
      setTimeout(() => {
        a.classList.remove("aberta");
        b.classList.remove("aberta");
        cartasViradas = [];
        bloqueado = false;
        verificarLimite();
      }, 1000);
    }
  }
}

function verificarLimite(){
  if(movimentos >= LIMITE_MOVIMENTOS && paresEncontrados < 8){
    derrota();
  }
}

/* ------------------- placar ------------------- */
function atualizarMovs(){
  elMovs.textContent = `${movimentos} / ${LIMITE_MOVIMENTOS}`;
  elMovs.classList.toggle("alerta", LIMITE_MOVIMENTOS - movimentos <= 4);
}

function iniciarCronometro(){
  cronometro = setInterval(() => {
    segundos++;
    const m = String(Math.floor(segundos / 60)).padStart(2,"0");
    const s = String(segundos % 60).padStart(2,"0");
    elTempo.textContent = `${m}:${s}`;
  }, 1000);
}

/* ------------------- fim de jogo ------------------- */
function vitoria(){
  clearInterval(cronometro);
  document.getElementById("statsVitoria").textContent =
    `Em ${movimentos} movimentos e ${elTempo.textContent} de puro amor.`;
  setTimeout(() => {
    document.getElementById("telaVitoria").classList.add("visivel");
  }, 700);
}

function derrota(){
  clearInterval(cronometro);
  bloqueado = true;
  setTimeout(() => {
    document.getElementById("telaDerrota").classList.add("visivel");
  }, 600);
}

function reiniciar(){
  document.getElementById("telaVitoria").classList.remove("visivel");
  document.getElementById("telaDerrota").classList.remove("visivel");
  clearInterval(cronometro);
  cartasViradas = [];
  paresEncontrados = 0;
  movimentos = 0;
  segundos = 0;
  bloqueado = false;
  comecou = false;
  elTempo.textContent = "00:00";
  atualizarMovs();
  montar();
}

/* ------------------- corações no fundo ------------------- */
(function criarCoracoes(){
  for(let i = 0; i < 12; i++){
    const c = document.createElement("div");
    c.className = "coracao-bg";
    c.textContent = "❤";
    c.style.left = Math.random() * 100 + "vw";
    c.style.fontSize = (14 + Math.random() * 22) + "px";
    c.style.animationDuration = (9 + Math.random() * 10) + "s";
    c.style.animationDelay = (Math.random() * 12) + "s";
    document.body.appendChild(c);
  }
})();

/* ------------------- iniciar ------------------- */
atualizarMovs();
montar();
</script>
